office_play_music:
  mode: single
  sequence:
    # Turn on receiver
    - service: switch.turn_on
      entity_id:
        - switch.template_av_office_receiver
    # Set Volume
    - service: media_player.volume_set
      data:
        volume_level: 0.25
      target:
        entity_id: media_player.office
    # Shuffle
    - service: media_player.shuffle_set
      target:
        entity_id: media_player.heos_office
      data:
        shuffle: true
    # Set sound mode to MCH STEREO
    - service: media_player.select_sound_mode
      data:
        entity_id: media_player.office
        sound_mode: MCH STEREO
    # Play random playlist
    - service: script.office_set_random_playlist

set_ev_charger_current:
  mode: queued
  fields:
    amps:
      name: Amps
      description: Current limit for the Alfen charger.
      selector:
        number:
          min: 6
          max: 16
          step: 1
          unit_of_measurement: A
  sequence:
    - variables:
        requested_amps: "{{ amps | int(8) }}"
        safe_amps: "{{ [16, [6, requested_amps] | max] | min }}"
    - service: number.set_value
      target:
        entity_id: number.alfen_max_station_current_2
      data:
        value: "{{ safe_amps }}"
