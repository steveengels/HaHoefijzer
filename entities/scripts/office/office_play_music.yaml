mode: single
sequence:
  # Turn on receiver
  - service: switch.turn_on
    entity_id:
      - switch.template_av_office_receiver
  # Set Volume
  - service: media_player.volume_set
    data:
      volume_level: 0.25
    target:
      entity_id: media_player.office
  # Shuffle
  - service: media_player.shuffle_set
    target:
      entity_id: media_player.heos_office
    data:
      shuffle: true
  # Set sound mode to MCH STEREO
  - service: media_player.select_sound_mode
    data:
      entity_id: media_player.office
      sound_mode: MCH STEREO
  # Play random playlist
  - service: script.office_set_random_playlist
