alias: Airco Slaapkamer - Start koelen boven 25°C
id: airco_slaapkamer_startkoelen
description: Start de airco op koelen bij 23°C als het warmer is dan 25°C en start een timer van 30 minuten
trigger:
  - platform: numeric_state
    entity_id: sensor.aircoslaapkamer_climatecontrol_room_temperature
    above: 25

condition:
  - condition: not
    conditions:
      - condition: state
        entity_id: climate.aircoslaapkamer_room_temperature
        state: "cool"
  - condition: time
    after: "21:00:00"
    before: "23:59:59"

action:
  - service: climate.set_temperature
    target:
      entity_id: climate.aircoslaapkamer_room_temperature
    data:
      temperature: 23
      hvac_mode: cool

  - service: timer.start
    data:
      duration: "00:30:00"
    target:
      entity_id: timer.timer_airco_slaapkamer_koelen

mode: single
