alias: Licht tuin aan na aanzetten Jacuzzi
id: licht_tuin_aan_jacuzzi
trigger:
  - platform: state
    entity_id: binary_sensor.hoefijzer_spa_in_use
    to: "on"

condition:
  - condition: sun
    after: sunset
  - condition: time
    after: "19:00:00"
    before: "23:59:59"

action:
  - service: switch.turn_on
    target:
      entity_id: switch.shelly_licht_tuin_switch_0

mode: single
