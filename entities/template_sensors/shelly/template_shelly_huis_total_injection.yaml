name: template_shelly_huis_total_injection
unit_of_measurement: "W"
unique_id: template_shelly_huis_total_injection
state_class: measurement
device_class: power
state: >
  {% set val = (states('sensor.shellyemhuis_em2_power') | float) %}
  {% if val < 0 %}
    {{ (val * -1) * 1000}}
  {% else %}
    0
  {% endif %}