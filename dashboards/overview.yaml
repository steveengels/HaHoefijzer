views:
  - path: default_view
    title: Home
    cards:
      - square: true
        type: grid
        cards:
          - show_state: true
            show_name: false
            camera_view: auto
            fit_mode: cover
            type: picture-entity
            entity: device_tracker.stevehoefijzer
            aspect_ratio: "1"
            image:
              media_content_id: >-
                data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'
                viewBox='0 0 50 50' width='50' height='50'
                style='background-color:%23b3e5fc'%3E%3Cg%3E%3Ctext
                font-family='roboto' x='50%25' y='50%25' text-anchor='middle'
                stroke='%23212121' font-size='1.3em'
                dy='.3em'%3ESE%3C/text%3E%3C/g%3E%3C/svg%3E
          - show_state: true
            show_name: false
            camera_view: auto
            fit_mode: cover
            type: picture-entity
            entity: person.maxime_de_cock
            aspect_ratio: "1"
            image:
              media_content_id: >-
                data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'
                viewBox='0 0 50 50' width='50' height='50'
                style='background-color:%23b3e5fc'%3E%3Cg%3E%3Ctext
                font-family='roboto' x='50%25' y='50%25' text-anchor='middle'
                stroke='%23212121' font-size='1.3em'
                dy='.3em'%3EM%3C/text%3E%3C/g%3E%3C/svg%3E
        columns: 2
        title: Aanwezig
      - show_current: true
        show_forecast: true
        type: weather-forecast
        entity: weather.forecast_thuis
        forecast_type: daily
      - type: entities
        entities:
          - sensor.ikea_of_sweden_vindstyrka_luchtvochtigheid
          - sensor.ikea_of_sweden_vindstyrka_pm2_5
          - sensor.ikea_of_sweden_vindstyrka_temperatuur
          - sensor.ikea_of_sweden_vindstyrka_voc_index
      - type: entities
        entities:
          - switch.garagestopcontact_schakelaar
        title: GarageStopContact
  - type: sections
    max_columns: 4
    title: Verlichting
    path: verlichting
    icon: mdi:lightbulb
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Verlichting
            heading_style: title
            badges: []
          - type: tile
            entity: light.marmergarage
            vertical: false
            features_position: bottom
            grid_options:
              columns: full
          - type: tile
            entity: light.marmerwoonkamer
            vertical: false
            features_position: bottom
            grid_options:
              columns: full
          - type: tile
            entity: light.keuken
            vertical: false
            features_position: bottom
            grid_options:
              columns: full
          - type: tile
            entity: light.boekenkastlinks
            vertical: false
            features_position: bottom
            grid_options:
              columns: full
          - type: tile
            entity: light.boekenkastrechts
            vertical: false
            features_position: bottom
            grid_options:
              columns: full
          - type: tile
            grid_options:
              columns: full
              rows: 1
            entity: switch.shelly_licht_tuin_switch_0
            vertical: false
            tap_action:
              action: toggle
            features_position: bottom
      - type: grid
        cards:
          - type: heading
            heading_style: title
            heading: Automatisering
          - show_name: true
            show_icon: true
            type: button
            name: Licht Aan
            icon: mdi:lightbulb
            tap_action:
              action: call-service
              service: automation.trigger
              service_data:
                entity_id: automation.licht_woonkamer_aan
            color: accent
          - show_name: true
            show_icon: true
            type: button
            name: Licht uit
            icon: mdi:lightbulb
            tap_action:
              action: call-service
              service: automation.trigger
              service_data:
                entity_id: automation.licht_woonkamer_uit
            color: disabled
    badges:
      - type: entity
        show_name: false
        show_state: true
        show_icon: true
        entity: sensor.date_time
  - type: masonry
    path: energy
    title: Energy
    theme: happy
    cards:
      - title: Energiedistributie vandaag
        type: energy-distribution
        link_dashboard: true
    badges:
      - type: entity
        show_name: false
        show_state: true
        show_icon: true
        entity: sensor.sun_next_dawn
  - type: sections
    max_columns: 4
    title: Klimaat
    path: klimaat
    icon: mdi:air-conditioner
    sections:
      - type: grid
        cards:
          - features:
              - type: climate-hvac-modes
              - type: climate-fan-modes
                style: dropdown
              - type: climate-swing-modes
                style: dropdown
              - type: climate-swing-horizontal-modes
                style: dropdown
              - type: target-temperature
            type: tile
            entity: climate.aircobureau_room_temperature
            features_position: bottom
            vertical: true
            show_entity_picture: true
            state_content:
              - temperature
              - current_temperature
            icon: mdi:air-conditioner
            grid_options:
              columns: 12
              rows: 7
          - features:
              - type: climate-hvac-modes
              - type: climate-fan-modes
                style: dropdown
              - type: climate-swing-modes
                style: dropdown
              - type: climate-swing-horizontal-modes
                style: dropdown
              - type: target-temperature
            type: tile
            entity: climate.aircowoonkamer_room_temperature
            features_position: bottom
            vertical: true
            show_entity_picture: true
            state_content:
              - temperature
              - current_temperature
            icon: mdi:air-conditioner
            grid_options:
              columns: 12
              rows: 7
          - features:
              - type: climate-hvac-modes
              - type: climate-fan-modes
                style: dropdown
              - type: climate-swing-modes
                style: dropdown
              - type: climate-swing-horizontal-modes
                style: dropdown
              - type: target-temperature
            type: tile
            entity: climate.aircoslaapkamer_room_temperature
            features_position: bottom
            vertical: true
            show_entity_picture: true
            state_content:
              - temperature
              - current_temperature
            icon: mdi:air-conditioner
            grid_options:
              columns: 12
              rows: 7
          - type: tile
            grid_options:
              columns: 12
              rows: 2
            entity: switch.shellyventilatorswitch
            vertical: false
            tap_action:
              action: toggle
            features_position: bottom
        column_span: 4
    header:
      layout: start
      badges_position: top
      badges_wrap: wrap
    badges:
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.aircowoonkamer_climatecontrol_room_temperature
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.aircowoonkamer_climatecontrol_outdoor_temperature
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: automation.airco_bureau_start_koelen_boven_25degc
        show_entity_picture: true
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: automation.airco_slaapkamer_start_koelen_boven_25degc
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: automation.airco_woonkamer_start_koelen_boven_25degc
      - type: entity
        show_name: false
        show_state: true
        show_icon: true
        entity: switch.shellyventilatorswitch
  - type: sections
    max_columns: 4
    title: Media
    path: media
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Sonos
            heading_style: title
          - type: media-control
            entity: media_player.hobbyruimte
    cards: []
  - type: sections
    max_columns: 4
    title: Beveiliging
    path: beveiliging
    icon: mdi:security
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Camera's
            heading_style: title
            icon: mdi:cctv
          - type: tile
            grid_options:
              columns: full
              rows: 1
            entity: camera.inkom
            show_entity_picture: true
            state_content:
              - motion_detection
              - temperature_c
              - battery
            vertical: false
            features_position: bottom
          - type: tile
            grid_options:
              columns: full
            entity: camera.garage
            show_entity_picture: true
            state_content:
              - motion_detection
              - temperature_c
              - battery
            vertical: false
            features_position: bottom
          - type: tile
            grid_options:
              columns: full
            entity: camera.huiskamer
            show_entity_picture: true
            state_content: motion_detection
            vertical: false
            features_position: bottom
          - type: tile
            grid_options:
              columns: full
            entity: camera.tuin
            show_entity_picture: true
            state_content:
              - motion_detection
              - temperature_c
              - battery
            vertical: false
            features_position: bottom
        column_span: 4
    header: {}
    badges:
      - type: entity
        show_name: false
        show_state: true
        show_icon: true
        entity: sensor.time
      - type: entity
        show_name: false
        show_state: true
        show_icon: true
        entity: alarm_control_panel.blink_hoefijzer
