title: Hoefijzer
background: var(--background-image)
views:
  - path: default_view
    title: Home
    theme: hoefijzer_ios
    cards:
      - square: true
        type: grid
        cards:
          - show_state: true
            show_name: false
            camera_view: auto
            fit_mode: cover
            type: picture-entity
            entity: device_tracker.stevehoefijzer
            aspect_ratio: "1"
            image:
              media_content_id: >-
                data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'
                viewBox='0 0 50 50' width='50' height='50'
                style='background-color:%23b3e5fc'%3E%3Cg%3E%3Ctext
                font-family='roboto' x='50%25' y='50%25' text-anchor='middle'
                stroke='%23212121' font-size='1.3em'
                dy='.3em'%3ESE%3C/text%3E%3C/g%3E%3C/svg%3E
          - show_state: true
            show_name: false
            camera_view: auto
            fit_mode: cover
            type: picture-entity
            entity: person.maxime_de_cock
            aspect_ratio: "1"
            image:
              media_content_id: >-
                data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'
                viewBox='0 0 50 50' width='50' height='50'
                style='background-color:%23b3e5fc'%3E%3Cg%3E%3Ctext
                font-family='roboto' x='50%25' y='50%25' text-anchor='middle'
                stroke='%23212121' font-size='1.3em'
                dy='.3em'%3EM%3C/text%3E%3C/g%3E%3C/svg%3E
        columns: 2
        title: Aanwezig
      - show_current: true
        show_forecast: true
        type: weather-forecast
        entity: weather.forecast_thuis
        forecast_type: daily
      - type: entities
        entities:
          - sensor.ikea_of_sweden_vindstyrka_luchtvochtigheid
          - sensor.ikea_of_sweden_vindstyrka_pm2_5
          - sensor.ikea_of_sweden_vindstyrka_temperatuur
          - sensor.ikea_of_sweden_vindstyrka_voc_index
      - type: entities
        entities:
          - switch.garagestopcontact_schakelaar
        title: GarageStopContact
  - type: sections
    max_columns: 4
    title: Verlichting
    path: verlichting
    icon: mdi:lightbulb
    theme: hoefijzer_ios
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Verlichting
            heading_style: title
            badges: []
          - type: tile
            entity: light.marmergarage
            vertical: false
            features_position: bottom
            grid_options:
              columns: full
          - type: tile
            entity: light.marmerwoonkamer
            vertical: false
            features_position: bottom
            grid_options:
              columns: full
          - type: tile
            entity: light.keuken
            vertical: false
            features_position: bottom
            grid_options:
              columns: full
          - type: tile
            entity: light.boekenkastlinks
            vertical: false
            features_position: bottom
            grid_options:
              columns: full
          - type: tile
            entity: light.boekenkastrechts
            vertical: false
            features_position: bottom
            grid_options:
              columns: full
          - type: tile
            grid_options:
              columns: full
              rows: 1
            entity: switch.shelly_licht_tuin_switch_0
            vertical: false
            tap_action:
              action: toggle
            features_position: bottom
      - type: grid
        cards:
          - type: heading
            heading_style: title
            heading: Automatisering
          - show_name: true
            show_icon: true
            type: button
            name: Licht Aan
            icon: mdi:lightbulb
            tap_action:
              action: call-service
              service: automation.trigger
              service_data:
                entity_id: automation.licht_woonkamer_aan
            color: accent
          - show_name: true
            show_icon: true
            type: button
            name: Licht uit
            icon: mdi:lightbulb
            tap_action:
              action: call-service
              service: automation.trigger
              service_data:
                entity_id: automation.licht_woonkamer_uit
            color: disabled
    badges:
      - type: entity
        show_name: false
        show_state: true
        show_icon: true
        entity: sensor.date_time
  - type: sections
    max_columns: 4
    path: energy
    title: Energie
    icon: mdi:home-lightning-bolt
    theme: hoefijzer_ios
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Vandaag
            heading_style: title
            icon: mdi:transmission-tower
          - title: Energiedistributie
            type: energy-distribution
            link_dashboard: true
        column_span: 2
      - type: grid
        cards:
          - type: heading
            heading: EV laden
            heading_style: title
            icon: mdi:ev-station
          - type: entities
            title: Laadregeling
            show_header_toggle: false
            entities:
              - entity: input_select.ev_charging_mode
                name: Modus
              - entity: input_number.ev_charging_battery_reserve
                name: Batterijreserve
              - entity: number.alfen_max_station_current_2
                name: Max. laadstroom
          - type: tile
            entity: sensor.shellyemhuis_em0_power
            name: Laadvermogen
            icon: mdi:flash
            features_position: bottom
            vertical: false
            grid_options:
              columns: 6
          - type: tile
            entity: sensor.shellyemhuis_em0_total_active_energy
            name: Laadenergie
            icon: mdi:counter
            features_position: bottom
            vertical: false
            grid_options:
              columns: 6
      - type: grid
        cards:
          - type: heading
            heading: Net en zon
            heading_style: title
            icon: mdi:solar-power-variant
          - type: tile
            entity: sensor.shellyemhuis_em2_power
            name: Netvermogen
            icon: mdi:transmission-tower
            features_position: bottom
            vertical: false
            grid_options:
              columns: 6
          - type: tile
            entity: sensor.grid_power_2_minute_average
            name: Net 2 min.
            icon: mdi:chart-line
            features_position: bottom
            vertical: false
            grid_options:
              columns: 6
          - type: tile
            entity: sensor.shellyemhuis_em1_power
            name: Zon huis
            icon: mdi:solar-panel
            features_position: bottom
            vertical: false
            grid_options:
              columns: 6
          - type: tile
            entity: sensor.shellyemtuin_em0_power
            name: Zon tuin
            icon: mdi:solar-panel-large
            features_position: bottom
            vertical: false
            grid_options:
              columns: 6
          - type: entities
            title: Meterstanden
            show_header_toggle: false
            entities:
              - entity: sensor.shellyemhuis_em2_total_active_energy
                name: Import
              - entity: sensor.shellyemhuis_em2_total_active_returned_energy
                name: Export
      - type: grid
        cards:
          - type: heading
            heading: Batterij en verbruikers
            heading_style: title
            icon: mdi:home-battery
          - type: tile
            entity: sensor.gx_device_dc_battery_charge
            name: Batterijlading
            icon: mdi:battery
            features_position: bottom
            vertical: false
            grid_options:
              columns: 6
          - type: tile
            entity: sensor.gx_device_dc_battery_power
            name: Batterijvermogen
            icon: mdi:battery-charging
            features_position: bottom
            vertical: false
            grid_options:
              columns: 6
          - type: tile
            entity: binary_sensor.hoefijzer_spa_in_use
            name: Jacuzzi actief
            icon: mdi:hot-tub
            features_position: bottom
            vertical: false
            grid_options:
              columns: 6
          - type: tile
            entity: timer.timer_jacuzzi
            name: Jacuzzi prioriteit
            icon: mdi:timer-outline
            features_position: bottom
            vertical: false
            grid_options:
              columns: 6
      - type: grid
        cards:
          - type: heading
            heading: Energie trend
            heading_style: title
            icon: mdi:chart-areaspline
          - type: history-graph
            title: Laatste 6 uur
            hours_to_show: 6
            entities:
              - sensor.shellyemhuis_em2_power
              - sensor.grid_power_2_minute_average
              - sensor.shellyemhuis_em1_power
              - sensor.shellyemtuin_em0_power
              - sensor.gx_device_dc_battery_power
        column_span: 4
    header:
      layout: start
      badges_position: top
      badges_wrap: wrap
    badges:
      - type: entity
        show_name: false
        show_state: true
        show_icon: true
        entity: sensor.sun_next_dawn
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: input_select.ev_charging_mode
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.shellyemhuis_em2_power
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.gx_device_dc_battery_charge
  - type: sections
    max_columns: 4
    title: Klimaat
    path: klimaat
    icon: mdi:air-conditioner
    theme: hoefijzer_ios
    sections:
      - type: grid
        cards:
          - features:
              - type: climate-hvac-modes
              - type: climate-fan-modes
                style: dropdown
              - type: climate-swing-modes
                style: dropdown
              - type: climate-swing-horizontal-modes
                style: dropdown
              - type: target-temperature
            type: tile
            entity: climate.aircobureau_room_temperature
            features_position: bottom
            vertical: true
            show_entity_picture: true
            state_content:
              - temperature
              - current_temperature
            icon: mdi:air-conditioner
            grid_options:
              columns: 12
              rows: 7
          - features:
              - type: climate-hvac-modes
              - type: climate-fan-modes
                style: dropdown
              - type: climate-swing-modes
                style: dropdown
              - type: climate-swing-horizontal-modes
                style: dropdown
              - type: target-temperature
            type: tile
            entity: climate.aircowoonkamer_room_temperature
            features_position: bottom
            vertical: true
            show_entity_picture: true
            state_content:
              - temperature
              - current_temperature
            icon: mdi:air-conditioner
            grid_options:
              columns: 12
              rows: 7
          - features:
              - type: climate-hvac-modes
              - type: climate-fan-modes
                style: dropdown
              - type: climate-swing-modes
                style: dropdown
              - type: climate-swing-horizontal-modes
                style: dropdown
              - type: target-temperature
            type: tile
            entity: climate.aircoslaapkamer_room_temperature
            features_position: bottom
            vertical: true
            show_entity_picture: true
            state_content:
              - temperature
              - current_temperature
            icon: mdi:air-conditioner
            grid_options:
              columns: 12
              rows: 7
          - type: tile
            grid_options:
              columns: 12
              rows: 2
            entity: switch.shellyventilatorswitch
            vertical: false
            tap_action:
              action: toggle
            features_position: bottom
        column_span: 4
      - type: grid
        cards:
          - type: heading
            heading: Slimme regeling
            heading_style: title
            icon: mdi:thermostat-auto
          - type: entities
            title: Airco modus
            show_header_toggle: false
            entities:
              - entity: input_select.airco_mode
                name: Modus
              - entity: timer.timer_airco_bureau_koelen
                name: Bureau timer
              - entity: timer.timer_airco_slaapkamer_koelen
                name: Slaapkamer timer
              - entity: timer.timer_airco_woonkamer_koelen
                name: Woonkamer timer
          - type: tile
            entity: automation.airco_bureau_start_koelen_boven_25degc
            name: Bureau auto-koelen
            icon: mdi:office-building
            features_position: bottom
            vertical: false
            grid_options:
              columns: 4
          - type: tile
            entity: automation.airco_woonkamer_start_koelen_boven_25degc
            name: Woonkamer auto-koelen
            icon: mdi:sofa
            features_position: bottom
            vertical: false
            grid_options:
              columns: 4
          - type: tile
            entity: automation.airco_slaapkamer_start_koelen_boven_25degc
            name: Slaapkamer auto-koelen
            icon: mdi:bed
            features_position: bottom
            vertical: false
            grid_options:
              columns: 4
        column_span: 4
    header:
      layout: start
      badges_position: top
      badges_wrap: wrap
    badges:
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.aircowoonkamer_climatecontrol_room_temperature
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.aircowoonkamer_climatecontrol_outdoor_temperature
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: automation.airco_bureau_start_koelen_boven_25degc
        show_entity_picture: true
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: automation.airco_slaapkamer_start_koelen_boven_25degc
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: automation.airco_woonkamer_start_koelen_boven_25degc
      - type: entity
        show_name: false
        show_state: true
        show_icon: true
        entity: switch.shellyventilatorswitch
  - type: sections
    max_columns: 4
    title: Media
    path: media
    theme: hoefijzer_ios
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Sonos
            heading_style: title
          - type: media-control
            entity: media_player.hobbyruimte
    cards: []
  - type: sections
    max_columns: 4
    title: Beveiliging
    path: beveiliging
    icon: mdi:security
    theme: hoefijzer_ios
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Camera's
            heading_style: title
            icon: mdi:cctv
          - type: tile
            grid_options:
              columns: full
              rows: 1
            entity: camera.inkom
            show_entity_picture: true
            state_content:
              - motion_detection
              - temperature_c
              - battery
            vertical: false
            features_position: bottom
          - type: tile
            grid_options:
              columns: full
            entity: camera.garage
            show_entity_picture: true
            state_content:
              - motion_detection
              - temperature_c
              - battery
            vertical: false
            features_position: bottom
          - type: tile
            grid_options:
              columns: full
            entity: camera.huiskamer
            show_entity_picture: true
            state_content: motion_detection
            vertical: false
            features_position: bottom
          - type: tile
            grid_options:
              columns: full
            entity: camera.tuin
            show_entity_picture: true
            state_content:
              - motion_detection
              - temperature_c
              - battery
            vertical: false
            features_position: bottom
        column_span: 4
    header: {}
    badges:
      - type: entity
        show_name: false
        show_state: true
        show_icon: true
        entity: sensor.time
      - type: entity
        show_name: false
        show_state: true
        show_icon: true
        entity: alarm_control_panel.blink_hoefijzer
