- alias: Laadpaal smart vermogen
  id: laadpaal_smart_vermogen
  description: Adjust the Alfen charger current using mode, solar export, battery reserve, time, and jacuzzi priority.
  triggers:
    - platform: time_pattern
      minutes: "/5"
    - platform: time
      at:
        - "00:00:00"
        - "18:00:00"
    - platform: state
      entity_id:
        - input_select.ev_charging_mode
        - input_number.ev_charging_battery_reserve
        - binary_sensor.hoefijzer_spa_in_use
        - timer.timer_jacuzzi
        - sensor.jk_bms_id_512_charge
    - platform: numeric_state
      entity_id: sensor.grid_power_2_minute_average
      above: 900
    - platform: numeric_state
      entity_id: sensor.grid_power_w
      above: 8000
    - platform: numeric_state
      entity_id: sensor.grid_power_2_minute_average
      below: -700
  action:
    - if:
        - condition: state
          entity_id: binary_sensor.hoefijzer_spa_in_use
          state: "on"
      then:
        - service: timer.start
          target:
            entity_id: timer.timer_jacuzzi
    - variables:
        mode: "{{ states('input_select.ev_charging_mode') }}"
        grid_power_w: "{{ states('sensor.grid_power_2_minute_average') | float(0) }}"
        instant_grid_power_w: "{{ states('sensor.grid_power_w') | float(0) }}"
        battery_soc: "{{ states('sensor.jk_bms_id_512_charge') | float(0) }}"
        battery_reserve: "{{ states('input_number.ev_charging_battery_reserve') | float(55) }}"
        current_limit: "{{ states('number.alfen_max_station_current_2') | float(8) }}"
        jacuzzi_priority: >
          {{ is_state('binary_sensor.hoefijzer_spa_in_use', 'on')
             or not is_state('timer.timer_jacuzzi', 'idle') }}
        solar_amps: >
          {% if grid_power_w < -4200 %}
            16
          {% elif grid_power_w < -3200 %}
            14
          {% elif grid_power_w < -2300 %}
            12
          {% elif grid_power_w < -1500 %}
            10
          {% elif grid_power_w < -1300 %}
            8
          {% elif grid_power_w < -700 %}
            6
          {% elif grid_power_w > 900 %}
            {{ [6, current_limit - 2] | max | int }}
          {% else %}
            {{ current_limit | int }}
          {% endif %}
        target_amps: >
          {% if instant_grid_power_w > 8000 %}
            6
          {% elif jacuzzi_priority %}
            8
          {% elif mode == 'Paused' %}
            6
          {% elif mode == 'Boost' %}
            16
          {% elif mode == 'Normal' %}
            {{ 16 if now().hour < 18 else 8 }}
          {% elif mode == 'Solar' %}
            {{ 6 if battery_soc < battery_reserve else solar_amps | int }}
          {% else %}
            8
          {% endif %}
    - condition: template
      value_template: "{{ target_amps | int != current_limit | int }}"
    - service: script.set_ev_charger_current
      data:
        amps: "{{ target_amps | int }}"
  mode: restart
