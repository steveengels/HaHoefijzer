    - platform: state
      entity_id: binary_sensor.hoefijzer_spa_in_use
      to: "on"

  condition:
    - condition: sun
      after: sunset

  action:
    - service: switch.turn_on
      target:
        entity_id: switch.shelly_licht_tuin_switch_0

  mode: single
- alias: Licht tuin uit 10 minuten na uitzetten Jacuzzi
  id: licht_tuin_uit_jacuzzi
  trigger:
    - platform: state
      entity_id: binary_sensor.hoefijzer_spa_in_use
      to: "off"

  action:
    - service: timer.start
      target:
        entity_id: timer.timer_tuinlicht_jacuzzi

  mode: restart
- alias: Licht tuin uit na Jacuzzi timer
  id: licht_tuin_uit_jacuzzi_timer
