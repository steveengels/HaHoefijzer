- alias: Ventilatie tuinhuis schema
  id: ventilate_garden_shed_schedule
  description: Ventilate the shed for 15 minutes if temp is > 15°C or the sensor is unavailable.
  trigger:
    # Trigger : Every hour
    - platform: time_pattern
      minutes: 0

  condition:
    - condition: or
      conditions:
        # Condition: Temp > 15°C
        - condition: numeric_state
          entity_id: sensor.aircowoonkamer_climatecontrol_outdoor_temperature
          above: 15

        # Condition: Sensor unavailable or unknown
        - condition: state
          entity_id: sensor.aircowoonkamer_climatecontrol_outdoor_temperature
          state:
            - "unavailable"
            - "unknown"

    # Only allow between 11:00 and 23:00 or exactly at 06:00
    - condition: or
      conditions:
        - condition: time
          after: "10:59:00"
          before: "23:01:00"
        - condition: time
          after: "05:59:00"
          before: "06:01:00"

  action:
    - service: switch.turn_on
      target:
        entity_id: switch.shellyventilatorswitch

    - service: timer.start
      target:
        entity_id: timer.timer_tuinhuis_ventilatie

  mode: single
- alias: Ventilatie tuinhuis uit na timer
  id: ventilate_garden_shed_stop_after_timer
  description: Turn off the shed ventilation when the 15-minute timer finishes.
  trigger:
    - platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.timer_tuinhuis_ventilatie
  action:
    - service: switch.turn_off
      target:
        entity_id: switch.shellyventilatorswitch

  mode: single
- alias: Alarm aan nacht
  id: alarm_aan_nacht
  description: Automatically arm the alarm every day after 00:00
  trigger:
  - platform: time
    at: 00:00:00
  condition: []
  action:
  - service: alarm_control_panel.alarm_arm_away
    data: {}
    target:
      device_id: d295219210dafad22c2a16a886a069d6
  mode: single
- alias: Alarm aan verlaten woning
  id: alarm_aan_verlaten_woning
  description: Arm the alarm when everyone leaves home
  trigger:
    - platform: zone
      entity_id: device_tracker.steveengels
      zone: zone.home
      event: leave
    - platform: zone
      entity_id: device_tracker.oppo_a91
      zone: zone.home
      event: leave

  condition:
    # Only arm if BOTH devices are not home
    - condition: state
      entity_id: device_tracker.steveengels
      state: not_home
    - condition: state
      entity_id: device_tracker.oppo_a91
      state: not_home

  action:
    - service: alarm_control_panel.alarm_arm_away
      data: {}
      target:
        device_id: d295219210dafad22c2a16a886a069d6

  mode: single
- alias: Alarm uit betreden woning
  id: alarm_uit_betreden_woning
  description: Disarm the alarm when either device arrives home
  trigger:
  - platform: zone
    entity_id: device_tracker.steveengels
    zone: zone.home
    event: enter
  - platform: zone
    entity_id: device_tracker.oppo_a91
    zone: zone.home
    event: enter
  condition:
  - condition: not
    conditions:
    - condition: time
      after: 00:00:00
      before: 07:00:00
  - condition: or
    conditions:
    - condition: state
      entity_id: device_tracker.steveengels
      state: home
    - condition: state
      entity_id: device_tracker.oppo_a91
      state: home
  action:
  - service: alarm_control_panel.alarm_disarm
    data: {}
    target:
      device_id: d295219210dafad22c2a16a886a069d6
  mode: single
- alias: Alarm uit ochtend
  id: alarm_uit_ochtend
  description: Disarm the alarm after 7:00
  trigger:
  - platform: time
    at: 07:00:00
  condition: []
  action:
  - service: alarm_control_panel.alarm_disarm
    data: {}
    target:
      device_id: d295219210dafad22c2a16a886a069d6
  mode: single
- alias: Laadpaal vermogen verlagen
  id: laadpaal_vermogen_verlagen
  description: Verlaag het laadvermorgen van de laadpaal vanaf 18u, of wanneer de Jacuzzi actief is
  triggers:
    - at: "18:00"
      trigger: time
    - platform: state
      entity_id: binary_sensor.hoefijzer_spa_in_use
      to: "on"
  action:
    - service: number.set_value
      target:
        entity_id:
          - number.laadpaal_max_station_current
          - number.laadpaal_power_connector_external_max_current_socket_1
          - number.laadpaal_power_connector_max_current_socket_1
      data:
        value: 8
    - service: timer.start
      target:
        entity_id: timer.timer_jacuzzi
  mode: restart

- alias: Laadpaal vermogen verhogen
  id: laadpaal_vermogen_verhogen
  description: Verhoog het laadvermorgen van de laadpaal vanaf 00:00, of wanneer de Jacuzzi niet actief is
  triggers:
    - platform: time
      at: "00:00"
    - platform: state
      entity_id: binary_sensor.hoefijzer_spa_in_use
      to: "off"
    - platform: state
      entity_id: timer.timer_jacuzzi
      to: "idle"
  condition:
    - condition: state
      entity_id: binary_sensor.hoefijzer_spa_in_use
      state: "off"
    - condition: state
      entity_id: timer.timer_jacuzzi
      state: "idle"
    - condition: time
      before: "18:00"
  action:
    - service: number.set_value
      target:
        entity_id:
          - number.laadpaal_max_station_current
          - number.laadpaal_power_connector_external_max_current_socket_1
          - number.laadpaal_power_connector_max_current_socket_1
      data:
        value: 16
  mode: restart
