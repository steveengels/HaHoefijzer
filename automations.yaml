- alias: Airco Bureau - Start koelen boven 25°C
  id: airco_bureau_startkoelen
  description: Start de airco op koelen bij 23°C als het warmer is dan 25°C en start een timer van 30 minuten
  trigger:
    - platform: numeric_state
      entity_id: sensor.aircobureau_climatecontrol_room_temperature
      above: 25
    - platform: time_pattern
      minutes: "/15"

  condition:
    - condition: numeric_state
      entity_id: sensor.aircobureau_climatecontrol_room_temperature
      above: 25
    - condition: not
      conditions:
        - condition: state
          entity_id: climate.aircobureau_room_temperature
          state: "cool"
    - condition: time
      after: "07:00:00"
      before: "23:00:00"

  action:
    - service: climate.set_temperature
      target:
        entity_id: climate.aircobureau_room_temperature
      data:
        temperature: 23
        hvac_mode: cool

    - service: timer.start
      data:
        duration: "00:30:00"
      target:
        entity_id: timer.timer_airco_bureau_koelen

  mode: single
- alias: Airco Bureau - Stop koelen na 30 minuten
  id: airco_bureau_stopkoelen
  description: Zet de airco uit wanneer de 30-minuten timer verloopt
  trigger:
    - platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.timer_airco_bureau_koelen

  action:
    - service: climate.set_hvac_mode
      target:
        entity_id: climate.aircobureau_room_temperature
      data:
        hvac_mode: "off"

  mode: single
