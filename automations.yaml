- alias: Airco Bureau - Start koelen boven 25°C
  id: airco_bureau_startkoelen
  description: Start de airco op koelen bij 23 degC als het warmer is dan 25 degC en start een timer van 30 minuten
  trigger:
    - platform: numeric_state
      entity_id: sensor.aircobureau_climatecontrol_room_temperature
      above: 25
    - platform: time_pattern
      minutes: "/15"
    - platform: state
      entity_id: input_select.airco_mode

  condition:
    - condition: template
      value_template: >
        {% set threshold = 24 if is_state('input_select.airco_mode', 'Comfort') else 23 if is_state('input_select.airco_mode', 'Boost') else 25 %}
        {{ not is_state('input_select.airco_mode', 'Off')
           and states('sensor.aircobureau_climatecontrol_room_temperature') | float(0) > threshold }}
    - condition: not
      conditions:
        - condition: state
          entity_id: climate.aircobureau_room_temperature
          state: "cool"
    - condition: time
      after: "07:00:00"
      before: "23:00:00"

  action:
    - variables:
        target_temperature: "{{ 21 if is_state('input_select.airco_mode', 'Boost') else 22 if is_state('input_select.airco_mode', 'Comfort') else 23 }}"
        runtime: "{{ '01:00:00' if is_state('input_select.airco_mode', 'Boost') else '00:45:00' if is_state('input_select.airco_mode', 'Comfort') else '00:30:00' }}"
    - service: climate.set_temperature
      target:
        entity_id: climate.aircobureau_room_temperature
      data:
        temperature: "{{ target_temperature | int }}"
        hvac_mode: cool

    - service: timer.start
      data:
        duration: "{{ runtime }}"
      target:
        entity_id: timer.timer_airco_bureau_koelen

  mode: single
- alias: Airco Bureau - Stop koelen na 30 minuten
  id: airco_bureau_stopkoelen
  description: Zet de airco uit wanneer de 30-minuten timer verloopt
  trigger:
    - platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.timer_airco_bureau_koelen

  action:
    - service: climate.set_hvac_mode
      target:
        entity_id: climate.aircobureau_room_temperature
      data:
        hvac_mode: "off"

  mode: single
